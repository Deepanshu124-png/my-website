<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DeepTube</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#202020;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:red;
}

.search{
    width:50%;
    padding:10px;
    border-radius:20px;
    border:none;
}

.container{
    display:flex;
    justify-content:center;
    margin-top:30px;
}

.video-card{
    width:350px;
    background:#202020;
    border-radius:12px;
    overflow:hidden;
}

.thumbnail{
    width:100%;
    height:200px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.watch-btn{
    display:inline-block;
    padding:10px 20px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">▶ DeepTube</div>
    <input class="search" placeholder="Search videos...">
</div>

<div class="container">

<div class="video-card">

<img class="thumbnail"
src="https://via.placeholder.com/350x200.png?text=My+Video">

<div class="info">
<h3>My First Test Video</h3>
<p>Uploaded by Deepanshu</p>

<a class="watch-btn"
href=https://drive.google.com/file/d/15k_znpikWFOmJLGnJyRCcgb1RUleu0tg/view?usp=drivesdk
target="_blank">
Watch Video
</a>

</div>
</div>

</div>

</body>
</html>
