<!DOCTYPE html>
<html>
<head>
<title>System Breach</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff00;
    font-family:monospace;
    overflow:hidden;
}

#terminal{
    padding:20px;
    font-size:18px;
    white-space:pre-line;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

.glow{
    text-shadow:0 0 10px #00ff00;
}

#reveal{
    display:none;
    text-align:center;
    margin-top:100px;
    font-size:40px;
}
</style>
</head>

<body>

<div id="terminal" class="glow"></div>

<div id="reveal">
😂 GOTCHA 😂<br><br>
<span style="font-size:25px">
Relax bro, this was just a prank website.
</span>
</div>

<script>

const lines = [
"[+] Connecting to target...",
"[+] Bypassing firewall...",
"[+] Access Granted",
"[+] Locating device...",
"[+] IP Address Found",
"[+] Downloading private files...",
"[+] Cracking passwords...",
"[+] Accessing camera...",
"[+] Uploading data...",
"[+] SYSTEM COMPROMISED"
];

let terminal = document.getElementById("terminal");
let i = 0;

function typeLine(){
    if(i < lines.length){
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine,1000);
    }else{
        setTimeout(showPrank,2000);
    }
}

function showPrank(){
    document.getElementById("terminal").style.display="none";
    document.getElementById("reveal").style.display="block";
}

typeLine();

</script>

</body>
</html>
